services:
  postgres:
    image: postgres:16-alpine
    container_name: ashlyn-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: ashlyn
      POSTGRES_PASSWORD: ashlyn
      POSTGRES_DB: ashlyn
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ashlyn -d ashlyn"]
      interval: 2s
      timeout: 3s
      retries: 20
