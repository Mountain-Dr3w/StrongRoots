name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        name: Compute image tag
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          IMAGE="ghcr.io/${{ github.repository_owner }}/strongroots:${SHA}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ghcr.io/${{ github.repository_owner }}/strongroots:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trigger-velveteen:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Velveteen deploy
        if: ${{ secrets.VELVETEEN_WEBHOOK_URL != '' }}
        env:
          VELVETEEN_WEBHOOK_URL: ${{ secrets.VELVETEEN_WEBHOOK_URL }}
          VELVETEEN_TOKEN: ${{ secrets.VELVETEEN_TOKEN }}
          IMAGE: ${{ needs.build-and-push.outputs.image }}
        run: |
          curl -fsS -X POST "$VELVETEEN_WEBHOOK_URL" \
            -H "Authorization: Bearer $VELVETEEN_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"image\":\"${IMAGE}\",\"project\":\"strongroots\"}"
      - name: No Velveteen webhook configured
        if: ${{ secrets.VELVETEEN_WEBHOOK_URL == '' }}
        run: |
          echo "::warning::VELVETEEN_WEBHOOK_URL secret is empty; skipping deploy trigger"
