services:
  app:
    build: .
    image: ghcr.io/mountain-dr3w/strongroots:local
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://ashlyn:ashlyn@postgres:5432/ashlyn
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
      AUTH_RESEND_KEY: ${AUTH_RESEND_KEY:-}
      AUTH_RESEND_FROM: ${AUTH_RESEND_FROM:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
      SIGNED_URL_SECRET: ${SIGNED_URL_SECRET}
      CONTENT_STORAGE_DIR: /data/content
    volumes:
      - content-data:/data/content
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ashlyn
      POSTGRES_PASSWORD: ashlyn
      POSTGRES_DB: ashlyn
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ashlyn -d ashlyn"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  postgres-data:
  content-data:
